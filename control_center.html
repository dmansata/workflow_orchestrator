<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Control Center | Live Dashboard</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 350px; background: var(--card); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; height: 100vh; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 2rem; }
        
        /* Main Content */
        .main { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 2rem; }
        
        /* Inspect Panel (Right) */
        .inspect { width: 450px; background: #000; border-left: 1px solid var(--border); padding: 1rem; font-family: monospace; overflow-y: auto; }
        .inspect-title { color: var(--primary); font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; margin-bottom: 1rem; }
        
        /* UI Components */
        .card { background: var(--card); border-radius: 0.75rem; padding: 1.5rem; border: 1px solid var(--border); }
        .btn { padding: 0.6rem 1.2rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #10b981; color: white; }
        
        input, textarea { width: 100%; padding: 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; color: white; margin-bottom: 1rem; }
        
        .workflow-card { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.5rem; margin-bottom: 1rem; }
        
        .json-viewer { font-size: 0.85rem; white-space: pre-wrap; }
        .req-tag { color: #f59e0b; }
        .res-tag { color: #10b981; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">FLOW CTRL</div>
        <div class="card">
            <h4 style="margin-top:0">🔑 AUTHENTICATION</h4>
            <input type="text" id="username" placeholder="Username" value="NewUser123">
            <input type="password" id="password" placeholder="Password" value="password123">
            <input type="text" id="email" placeholder="Email (for Register)" value="newuser@example.com">
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-outline" style="flex:1" onclick="register()">Register</button>
                <button class="btn btn-primary" style="flex:1" onclick="login()">Login</button>
            </div>
            <div id="authStatus" style="font-size:0.7rem; color: #94a3b8; margin-top: 0.5rem; word-break: break-all;">No Token Set</div>
        </div>
        
        <div class="card">
            <h4 style="margin-top:0">🚀 TRIGGER WEBHOOK</h4>
            <input type="text" id="workflowId" placeholder="Workflow ID" value="1">
            <input type="text" id="webhookSecret" placeholder="Secret Key" value="my-super-secret-123">
            <button class="btn btn-success" style="width:100%" onclick="triggerWebhook()">Trigger via Secret</button>
        </div>

        <div class="card">
            <h4 style="margin-top:0">➕ CREATE WORKFLOW</h4>
            <input type="text" id="newWorkflowName" placeholder="Workflow Name" value="My New Flow">
            <textarea id="newWorkflowNodes" rows="5" placeholder="Nodes JSON">[{"id":"n1","type":"NOTIFY","config":{"message":"Hello!"}}]</textarea>
            <button class="btn btn-primary" style="width:100%" onclick="createNewWorkflow()">Create & Refresh</button>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h2 style="margin:0">📁 Workflow Management</h2>
                <button class="btn btn-outline" onclick="loadWorkflows()">Load My Workflows</button>
            </div>
            <div id="workflowList">Click the button to fetch your flows...</div>
        </div>

        <div class="card">
            <h2>📈 Recent Executions</h2>
            <div id="executionHistory">Select a workflow to see history...</div>
        </div>
    </div>

    <div class="inspect">
        <div class="inspect-title">📡 API INSPECTOR (LIVE)</div>
        <div id="inspectorContent"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';
        let jwtToken = '';

        function logTraffic(method, url, requestBody, responseData, status) {
            const panel = document.getElementById('inspectorContent');
            const entry = document.createElement('div');
            entry.style.marginBottom = '2rem';
            entry.innerHTML = `
                <div><span class="req-tag">[${method}]</span> ${url}</div>
                ${requestBody ? `<div style="color: #64748b; font-size: 0.75rem;">REQ: ${JSON.stringify(requestBody)}</div>` : ''}
                <div style="margin-top: 0.5rem;"><span class="res-tag">[STATUS ${status}]</span></div>
                <div class="json-viewer">${JSON.stringify(responseData, null, 2)}</div>
                <hr style="border: 0.5px solid #1e293b; margin-top: 1rem;">
            `;
            panel.prepend(entry);
        }

        async function apiCall(endpoint, method = 'GET', body = null, isPublic = false) {
            const headers = { 'Content-Type': 'application/json' };
            if (!isPublic && jwtToken) headers['Authorization'] = `Bearer ${jwtToken}`;

            try {
                const options = { method, headers };
                if (body) options.body = JSON.stringify(body);

                const response = await fetch(`${API_BASE}${endpoint}`, options);
                
                // Handle non-JSON responses
                const contentType = response.headers.get("content-type");
                let data;
                if (contentType && contentType.includes("application/json")) {
                    data = await response.json();
                } else {
                    data = { message: await response.text() };
                }

                logTraffic(method, `${API_BASE}${endpoint}`, body, data, response.status);
                return data;
            } catch (err) {
                console.error(err);
                logTraffic(method, endpoint, body, { error: err.message }, 'FAIL');
            }
        }

        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const data = await apiCall('/auth/register', 'POST', { username, password, email }, true);
            if (data && (data.id || data.message)) {
                document.getElementById('authStatus').innerText = "REGISTER SUCCESS - NOW LOGIN";
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const data = await apiCall('/auth/login', 'POST', { username, password }, true);
            if (data && data.token) {
                jwtToken = data.token;
                document.getElementById('authStatus').innerText = "TOKEN ACTIVE";
            }
        }

        async function loadWorkflows() {
            const workflows = await apiCall('/workflows');
            const list = document.getElementById('workflowList');
            list.innerHTML = '';
            workflows.forEach(w => {
                const div = document.createElement('div');
                div.className = 'workflow-card';
                const isDraft = w.status === 'DRAFT';
                div.innerHTML = `
                    <div>
                        <strong>${w.name}</strong> <small>(ID: ${w.id})</small> 
                        <span style="font-size:0.6rem; padding:2px 5px; border-radius:3px; background:${isDraft ? '#64748b' : '#10b981'}">${w.status}</span><br>
                        <span style="font-size:0.7rem; color:#94a3b8">Secret: ${w.webhookSecret}</span>
                    </div>
                    <div>
                        ${isDraft ? `<button class="btn btn-success" onclick="publishWorkflow(${w.id})">Publish</button>` : ''}
                        <button class="btn btn-outline" onclick="loadHistory(${w.id})">History</button>
                        <button class="btn btn-primary" onclick="triggerWorkflow(${w.id})">Trigger</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function publishWorkflow(id) {
            await apiCall(`/workflows/${id}/publish`, 'POST');
            loadWorkflows();
        }

        async function loadHistory(id) {
            const history = await apiCall(`/workflows/${id}/executions`);
            const panel = document.getElementById('executionHistory');
            panel.innerHTML = `<h3>History for Workflow #${id}</h3>`;
            if (history.length === 0) {
                panel.innerHTML += `<div style="color:#94a3b8">No executions found for this workflow.</div>`;
                return;
            }
            history.forEach(ex => {
                const div = document.createElement('div');
                div.className = 'workflow-card';
                div.innerHTML = `
                    <div>
                        Run #${ex.id} | <span style="color: ${ex.status === 'COMPLETED' ? '#10b981' : (ex.status === 'FAILED' ? '#ef4444' : '#f59e0b')}">${ex.status}</span><br>
                        <small>${ex.createdAt}</small>
                    </div>
                    <div>
                        ${ex.status === 'RUNNING' ? `<button class="btn btn-danger" onclick="pauseRun(${ex.id})">Pause</button>` : ''}
                        ${ex.status === 'PAUSED' ? `<button class="btn btn-success" onclick="resumeRun(${ex.id})">Resume</button>` : ''}
                    </div>
                `;
                panel.appendChild(div);
            });
        }

        async function triggerWorkflow(id) {
            await apiCall(`/workflows/${id}/start`, 'POST', {}); // Changed to /start to match service
            setTimeout(() => loadHistory(id), 1000);
        }

        async function createNewWorkflow() {
            const name = document.getElementById('newWorkflowName').value;
            const nodes = document.getElementById('newWorkflowNodes').value;
            const data = await apiCall('/workflows', 'POST', { name, nodes, description: "Dashboard created flow" });
            if (data && data.id) {
                // Auto-publish so it can be triggered immediately
                await apiCall(`/workflows/${data.id}/publish`, 'POST');
                loadWorkflows();
            }
        }

        async function triggerWebhook() {
            const id = document.getElementById('workflowId').value;
            const secret = document.getElementById('webhookSecret').value;
            // Public endpoint
            const headers = { 'Content-Type': 'application/json' };
            const response = await fetch(`${API_BASE}/webhooks/${id}?secret=${secret}`, { method: 'POST', headers });
            const data = await response.json();
            logTraffic('POST', `/webhooks/${id}?secret=***`, null, data, response.status);
            setTimeout(() => loadHistory(id), 1000);
        }

        async function pauseRun(id) { await apiCall(`/executions/${id}/pause`, 'POST'); }
        async function resumeRun(id) { await apiCall(`/executions/${id}/resume`, 'POST'); }

    </script>
</body>
</html>
